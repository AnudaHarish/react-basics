<!DOCTYPE html>
<html>
  <head>
    <title>ChatBot</title>
    <style>

      

    </style>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      //create a component
      //we can use fragemts to seperate over html code
      function ChatBotInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState('');

        function getInputText(event){
          setInputText(event.target.value);
        }

        function sendMessage(){
          //state will update the code at last
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              key: crypto.randomUUID()
            }
          ];
          setChatMessages(newChatMessages);
          //creating the chatbot resoponse
          const response = Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'robot',
              key: crypto.randomUUID()
            }
          ]);
          //delete the value in the input
          setInputText('');
        }

        return (
          <div className="input-container">
            <input 
              placeholder='Send a message to Chatbot' 
              size="30"
              onChange={getInputText}
              value={inputText}
              className="chat-input"
            />
            <button onClick={sendMessage} className="send-button">Send</button>
          </div>
        );
      }

      function ChatbotMessage({message, sender}){
        // const message = props.message;
        // const sender = props.sender;
        // const {message, sender} = {props};
        return (
          <div 
            className={sender === 'robot' 
              ? 'message-robot-container' 
              : 'message-user-container'
          }>
            {sender === 'robot' && (
              <img src='robot.png' width='50'/>
            )}
            <div className="chat-message">
              {message}
            </div>
            {sender === 'user' && (
              <img src='user.png' width='50'/>
            )}
          </div>
        );
      }

      function ChatMessages({chatMessages}){
        const containerElm = React.useRef(null);
        React.useEffect(() => {
          const container = containerElm.current;
          if(container)
            container.scrollTop = container.scrollHeight;
        }, [chatMessages])
        return (
          <div className="chat-message-container" ref={containerElm}>
            {
              chatMessages.map((chatMessage) => {
                return (
                  <ChatbotMessage 
                    message={chatMessage.message}
                    sender={chatMessage.sender}
                    key={chatMessage.key}
                  />
                )
              })
            }
          </div>
        )
      }

      function App(){
        const [chatMessages, setChatMessages] = React.useState(
          [{
            message: 'hello chatbot',
            sender: 'user',
            key: 'Id1'
          }, {
            message: 'Hello! How can I help you?',
            sender: 'robot',
            key: 'Id2'
          }, {
            message: 'hello chatbot',
            sender: 'user',
            key: 'Id3'
          }, {
            message: 'Hello! How can I help you?',
            sender: 'robot',
            key: 'Id4'
          }]
        )
        // const chatMessages = array[0]; //gives the current data
        // const setChatMessages = array[1];
        return (
          <div className="app-container">
      
            <ChatMessages chatMessages={chatMessages} />
            <ChatBotInput 
              chatMessages={chatMessages} 
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }
      
      // const app = (
        
      // );

      const container = document.querySelector('.js-container');
      // ReactDOM.createRoot(container).render('Welcome to SuperSimpleDev React Course');
      ReactDOM.createRoot(container).render(<App />);
      
    </script>
  </body>
</html>
